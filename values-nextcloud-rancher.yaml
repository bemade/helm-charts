# Nextcloud v1.0.21 - Values for bemade/nextcloud chart with CloudNativePG
# Hostname: home.3387.vezina.biz

# Image configuration - FPM Alpine
image:
  registry: docker.io
  repository: library/nextcloud
  flavor: fpm-alpine
  tag: "33.0.0-fpm-alpine"
  pullPolicy: IfNotPresent

replicaCount: 1

# Nginx - REQUIRED for fpm-alpine image
nginx:
  enabled: true
  image:
    registry: docker.io
    repository: nginxinc/nginx-unprivileged
    tag: alpine
    pullPolicy: IfNotPresent
  containerPort: 8080
  ipFamilies:
    - IPv4
  config:
    default: true
    headers:
      Referrer-Policy: no-referrer
      Strict-Transport-Security: ""
      X-Content-Type-Options: nosniff
      X-Frame-Options: SAMEORIGIN
      X-Permitted-Cross-Domain-Policies: none
      X-Robots-Tag: "noindex, nofollow"
      X-XSS-Protection: "1; mode=block"
    serverBlockCustom: |
      client_max_body_size 10G;
      client_body_timeout 300s;
      fastcgi_buffers 64 4K;
      fastcgi_read_timeout 3600s;
  resources: {}
  securityContext: {}

# Standard ingress disabled - using Traefik IngressRoute
ingress:
  enabled: false

# Traefik IngressRoute
ingressRoute:
  enabled: true
  clusterIssuer: letsencrypt-cloudflare-vezina
  entryPoints:
    - websecure
  hsts:
    enabled: true
    maxAge: 15552000
    includeSubdomains: true
    preload: true

# OIDC Login configuration for Keycloak SSO
oidc:
  enabled: true
  providerUrl: "https://auth.3387.vezina.biz/realms/vezina"
  clientId: "nextcloud"
  # Client secret - chart will create the Kubernetes Secret with correct structure
  clientSecret: "Fj0VFAeuESiXPTsCrXm0vcSELMQXFXao"
  existingSecret: ""
  buttonText: "Se connecter avec Keycloak"
  autoRedirect: false
  endSessionRedirect: true
  hidePasswordForm: false
  disableRegistration: false
  tlsVerify: true
  scope: "openid profile email"
  attributes:
    id: "preferred_username"
    name: "name"
    mail: "email"
    groups: "groups"
  disableChangeDisplayName: true
  disableLostPassword: true
  # Keycloak resolves to private IP inside cluster
  allowLocalRemoteServers: true
  # Group management
  groups:
    create: true
    admin:
      - "admin"

# Nextcloud configuration
nextcloud:
  host: home.3387.vezina.biz
  
  # Admin credentials - chart will create the secret automatically
  username: itbemade
  password: "B3m4De!P455"
  
  existingSecret:
    enabled: false
  
  trustedDomains:
    - home.3387.vezina.biz
  
  datadir: /var/www/html/data
  
  # IMPORTANT: Must match nginx.containerPort for fpm+nginx
  containerPort: 8080
  
  # Set to 1 to skip install (use existing database)
  # Set to 0 for fresh install with auto-installation
  # Set to "auto" to auto-detect if DB exists
  update: "auto"
  
  defaultConfigs:
    .htaccess: true
    apache-pretty-urls.config.php: true
    apcu.config.php: true
    apps.config.php: true
    autoconfig.php: true
    redis.config.php: true
    reverse-proxy.config.php: true
    s3.config.php: true
    smtp.config.php: true
    swift.config.php: true
    upgrade-disable-web.config.php: true
    helm-metrics.config.php: true
    imaginary.config.php: false
  
  configs:
    # Required for reinstall/upgrade when database already exists
    CAN_INSTALL: ""
    custom.config.php: |-
      <?php
      $CONFIG = array (
        'serverid' => 'nextcloud-prod-01',
        'trusted_proxies' => array(
          0 => '10.42.0.0/16',
          1 => '10.43.0.0/16',
          2 => '127.0.0.1',
        ),
        // Use X-Forwarded-For and X-Real-IP headers to get real client IP
        'forwarded_for_headers' => array(
          0 => 'HTTP_X_FORWARDED_FOR',
          1 => 'HTTP_X_REAL_IP',
        ),
        'overwriteprotocol' => 'https',
        'overwritehost' => 'home.3387.vezina.biz',
        'overwrite.cli.url' => 'https://home.3387.vezina.biz',
        'default_phone_region' => 'CA',
        // Maintenance window start at 5 AM UTC (1 AM EST/EDT)
        'maintenance_window_start' => 5,
      );
  
  phpConfigs: {}
  mail:
    enabled: false
  objectStore:
    s3:
      enabled: false
    swift:
      enabled: false
  
  openmetrics:
    allowedClients:
      - "127.0.0.1"
      - "10.42.0.0/16"
      - "10.43.0.0/16"
  
  persistence:
    subPath: null
  
  podSecurityContext: {}
  securityContext: {}
  mariaDbInitContainer:
    resources: {}
    securityContext: {}
  postgreSqlInitContainer:
    resources: {}
    securityContext: {}
  
  strategy:
    type: Recreate
  
  hooks:
    pre-installation: null
    post-installation: |
      php /var/www/html/occ app:install oidc_login || true
      php /var/www/html/occ app:enable oidc_login || true
    pre-upgrade: null
    post-upgrade: null
    before-starting: |
      # Only run occ commands if Nextcloud is already installed
      if php /var/www/html/occ status --output=json 2>/dev/null | grep -q '"installed":true'; then
        echo "Nextcloud installed, running maintenance tasks..."
        php /var/www/html/occ app:install oidc_login || true
        php /var/www/html/occ app:enable oidc_login || true
        php /var/www/html/occ db:add-missing-indices -n
        php /var/www/html/occ db:add-missing-columns -n
        php /var/www/html/occ maintenance:repair --include-expensive -n
      else
        echo "Nextcloud not yet installed, skipping maintenance tasks"
      fi
  
  extraEnv: null
  extraInitContainers: []
  extraSidecarContainers: []
  extraVolumes: null
  extraVolumeMounts: null
  priorityClassName: ""

# Persistence at root level
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteMany
  size: 20Gi
  annotations: {}
  labels: {}
  hostPath: null
  nextcloudData:
    enabled: false
    accessMode: ReadWriteOnce
    size: 8Gi

# Resources at root level
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Internal Database - DISABLED (using CloudNativePG)
internalDatabase:
  enabled: false
  name: nextcloud

# External Database - PostgreSQL via CloudNativePG (CNPG)
externalDatabase:
  enabled: true
  type: postgresql
  host: nextcloud-db-rw.nextcloud.svc.cluster.local
  user: nextcloud
  password: ""
  database: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud-db-app
    usernameKey: username
    passwordKey: password

# Internal Redis
redis:
  enabled: true
  image:
    repository: docker.io/library/redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  auth:
    enabled: false
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: redis-password
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""

externalRedis:
  enabled: false

# CronJob for background tasks
cronjob:
  enabled: true
  type: cronjob
  cronjob:
    schedule: "*/5 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 5
    activeDeadlineSeconds: null
    backoffLimit: 1
    annotations: {}
    labels: {}
    podLabels: {}
    priorityClassName: ""
    resources: {}
    securityContext: {}
    affinity: {}
    command:
      - php
      - "-f"
      - /var/www/html/cron.php
      - "--"
      - "--verbose"
  sidecar:
    command:
      - /cron.sh
    lifecycle: {}
    resources: {}
    securityContext: {}

# Service
service:
  type: ClusterIP
  port: 8080
  loadBalancerIP: ""
  nodePort: null
  annotations: {}
  sessionAffinity: ""
  sessionAffinityConfig: {}

# Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

hpa:
  enabled: false
  cputhreshold: 60
  minPods: 1
  maxPods: 10

rbac:
  enabled: false
  serviceaccount:
    create: true
    name: nextcloud-serviceaccount
    annotations: {}

metrics:
  enabled: false

prometheus:
  rules:
    enabled: false
  serviceMonitor:
    enabled: false

imaginary:
  enabled: false

collabora:
  enabled: false

mariadb:
  enabled: false

postgresql:
  enabled: false

nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
deploymentAnnotations: {}
deploymentLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
dnsConfig: {}
priorityClassName: ""
lifecycle: {}
securityContext: {}
phpClientHttpsFix:
  enabled: false
  protocol: https
httpRoute:
  enabled: false
extraManifests: []

# CloudNativePG PostgreSQL cluster
cnpg:
  enabled: true
  instances: 1
  storage:
    size: 10Gi
  database:
    name: nextcloud
    owner: nextcloud

global:
  image:
    registry: null
  security:
    allowInsecureImages: true
