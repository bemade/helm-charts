{{- if .Values.keycloak.ingress.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "keycloak.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  secretName: {{ include "keycloak.fullname" . }}-tls
  issuerRef:
    name: {{ .Values.keycloak.ingress.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.keycloak.hostname }}
{{- end }}
