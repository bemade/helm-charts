apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.keycloak.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.keycloak.features.health }}
    - port: {{ .Values.keycloak.managementPort }}
      targetPort: management
      protocol: TCP
      name: management
    {{- end }}
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
---
# Headless service for clustering/DNS discovery
{{- if .Values.keycloak.clustering.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 7800
      targetPort: 7800
      protocol: TCP
      name: jgroups
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
{{- end }}
