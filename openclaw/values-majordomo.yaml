# OpenClaw Majordomo - Helm Values
# Override pour le déploiement Majordomo

fullnameOverride: ''
nameOverride: ''
openclaw:
  args: []
  backup:
    enabled: false
    failedJobsHistoryLimit: 3
    image:
      pullPolicy: IfNotPresent
      repository: alpine
      tag: '3.20'
    resources: {}
    retainCount: 7
    schedule: 0 3 * * *
    size: 2Gi
    storageClass: longhorn
    successfulJobsHistoryLimit: 3
    command: []
  config:
    agents:
      defaults:
        model:
          primary: ollama/glm-5:cloud
        compaction:
          memoryFlush:
            enabled: true
            prompt: >-
              Pre-compaction memory flush. Store durable memories now (use
              memory/YYYY-MM-DD.md; create memory/ if needed). IMPORTANT: If the
              file already exists, APPEND new content only — do not overwrite
              existing entries. Do NOT create timestamped variant files (e.g.,
              YYYY-MM-DD-HHMM.md); always use the canonical YYYY-MM-DD.md
              filename. If nothing to store, reply with NO_REPLY.
            softThresholdTokens: 4000
            systemPrompt: Session nearing compaction. Store durable memories now.
          mode: safeguard
          reserveTokensFloor: 20000
        maxConcurrent: 4
        models:
          ollama/deepseek-v3.1:671b-cloud: {}
          ollama/glm-4.7-flash:latest: {}
          ollama/glm-5:cloud: {}
          ollama/qwen3-coder-next:cloud: {}
          ollama/qwen3-coder:480b-cloud: {}
          ollama/qwen3.5:397b-cloud: {}
        subagents:
          maxConcurrent: 8
        workspace: /home/node/.openclaw/workspace
      list:
        - id: main
          model: ollama/glm-5:cloud
    gateway:
      mode: local
      auth:
        mode: token
        bind: lan
      controlUi:
        allowedOrigins:
          - https://majordomo.bemade.org
        dangerouslyDisableDeviceAuth: true
        enabled: true
        # Fix: ajoute le token pour les scopes operator
        auth:
          token: "977f73731f9cd2133f099ff3f549c23ec76b9ec751cc631a"
      nodes:
        denyCommands:
          - camera.snap
          - camera.clip
          - screen.record
          - contacts.add
          - calendar.add
          - reminders.add
          - sms.send
      port: 18789
      tailscale:
        mode: 'off'
        resetOnExit: false
    auth:
      profiles:
        ollama:default:
          mode: api_key
          provider: ollama
    commands:
      native: auto
      nativeSkills: auto
      ownerDisplay: raw
      restart: true
    cron:
      enabled: true
    env:
      shellEnv:
        enabled: false
    hooks:
      internal:
        enabled: true
        entries:
          boot-md:
            enabled: true
          bootstrap-extra-files:
            enabled: true
          command-logger:
            enabled: true
          session-memory:
            enabled: true
    messages:
      ackReactionScope: group-mentions
    models:
      providers:
        ollama:
          api: ollama
          apiKey:
            id: OLLAMA_API_KEY
            provider: default
            source: env
          baseUrl: https://ollama.com
          models:
            - id: glm-5:cloud
              name: GLM-5 Cloud
    secrets:
      providers:
        default:
          source: env
    session:
      dmScope: per-channel-peer
    tools:
      exec:
        applyPatch:
          allowModels: []
          enabled: true
      profile: coding
      web:
        search:
          provider: gemini
    extraEnv: {}
  hostname: majordomo.bemade.org
  image:
    pullPolicy: IfNotPresent
    # Nouvelle image Majordomo
    repository: registry.bemade.org/bemade/openclaw-odoo/openclaw-majordomo
    tag: latest
  ingress:
    clusterIssuer: letsencrypt-dns
    enabled: true
    forwardAuth:
      address: http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth
      authResponseHeaders:
        - X-Forwarded-User
        - X-Auth-Request-User
        - X-Auth-Request-Email
      enabled: false
      trustForwardHeader: true
    hsts:
      enabled: true
      includeSubdomains: true
      maxAge: 15552000
      preload: true
    nodeSelector: {}
  persistence:
    enabled: true
    size: 20Gi
    storageClass: cephfs
  plugins:
    odooDiscuss:
      enabled: null
  podAnnotations: {}
  podSecurityContext: {}
  port: 18789
  probes:
    liveness:
      initialDelaySeconds: 60
      path: /health
      periodSeconds: 30
    readiness:
      initialDelaySeconds: 15
      path: /health
      periodSeconds: 10
  resources:
    limits:
      cpu: 2
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  secrets:
    anthropicApiKey: null
    extra:
      OLLAMA_API_KEY: 1fb20054a4154fd5a46f49e415d1e065.qmNu68nWoVpiXOnR6p6JTNP3
    gatewayToken: 977f73731f9cd2133f099ff3f549c23ec76b9ec751cc631a
    openaiApiKey: null
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
  serviceAccount:
    annotations: {}
    create: false
  tolerations: []
global:
  cattle:
    systemProjectId: p-b4p8r