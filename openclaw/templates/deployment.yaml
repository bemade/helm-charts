apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate strategy required for single-writer PVC
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
      annotations:
        config-hash: {{ .Values.openclaw.config | toJson | sha256sum }}
        {{- with .Values.openclaw.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.openclaw.serviceAccount.create }}
      serviceAccountName: {{ include "openclaw.fullname" . }}
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
        {{- with .Values.openclaw.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.openclaw.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openclaw.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Init container: copy config from ConfigMap to PVC and prepare workspace
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /config
      containers:
        - name: gateway
          image: "{{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}"
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
          {{- with .Values.openclaw.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.openclaw.command }}
          command: {{- toYaml .Values.openclaw.command | nindent 12 }}
          {{- end }}
          {{- if .Values.openclaw.args }}
          args: {{- toYaml .Values.openclaw.args | nindent 12 }}
          {{- else }}
          # Default: pass openclaw.mjs script + gateway subcommand as args to node ENTRYPOINT
          args:
            - /app/openclaw.mjs
            - gateway
            - --port
            - "{{ .Values.openclaw.port }}"
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.openclaw.resources.requests.cpu }}
              memory: {{ .Values.openclaw.resources.requests.memory }}
            limits:
              cpu: {{ .Values.openclaw.resources.limits.cpu }}
              memory: {{ .Values.openclaw.resources.limits.memory }}
          ports:
            - name: gateway
              containerPort: {{ .Values.openclaw.port }}
              protocol: TCP
          env:
            # Required runtime env vars
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            # Built-in secrets (mapped to standard env vars)
            {{- if .Values.openclaw.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if .Values.openclaw.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            {{- if .Values.openclaw.secrets.gatewayToken }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            {{- end }}
            # Extra secrets (generic key/value → env vars)
            {{- range $envVar, $value := .Values.openclaw.secrets.extra }}
            {{- if $value }}
            - name: {{ $envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" $ }}-secrets
                  key: {{ $envVar }}
            {{- end }}
            {{- end }}
            # Extra plain env vars
            {{- range $key, $value := .Values.openclaw.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          # Liveness probe: exec-based node healthcheck (official pattern)
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:{{ .Values.openclaw.port }}/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: {{ .Values.openclaw.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.probes.liveness.periodSeconds }}
            timeoutSeconds: 10
          # Readiness probe: exec-based node readiness check
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:{{ .Values.openclaw.port }}/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: {{ .Values.openclaw.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "openclaw.fullname" . }}-config
        - name: openclaw-data
          {{- if .Values.openclaw.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp-volume
          emptyDir: {}
