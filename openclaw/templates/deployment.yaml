apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
      annotations:
        config-hash: {{ .Values.openclaw.config | toJson | sha256sum }}
        {{- with .Values.openclaw.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.openclaw.serviceAccount.create }}
      serviceAccountName: {{ include "openclaw.fullname" . }}
      {{- end }}
      {{- with .Values.openclaw.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openclaw.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.openclaw.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openclaw
          image: "{{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}"
          imagePullPolicy: {{ .Values.openclaw.image.pullPolicy }}
          {{- with .Values.openclaw.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.openclaw.command }}
          command: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.openclaw.args }}
          args: {{- toYaml .Values.openclaw.args | nindent 12 }}
          {{- else }}
          args: ["gateway", "--port", "{{ .Values.openclaw.port }}"]
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.openclaw.resources.requests.cpu }}
              memory: {{ .Values.openclaw.resources.requests.memory }}
            limits:
              cpu: {{ .Values.openclaw.resources.limits.cpu }}
              memory: {{ .Values.openclaw.resources.limits.memory }}
          ports:
            - containerPort: {{ .Values.openclaw.port }}
              name: http
          env:
            # Built-in secrets (mapped to standard env vars)
            {{- if .Values.openclaw.secrets.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if .Values.openclaw.secrets.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            {{- if .Values.openclaw.secrets.gatewayToken }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            {{- end }}
            # Extra secrets (generic key/value → env vars)
            {{- range $envVar, $value := .Values.openclaw.secrets.extra }}
            {{- if $value }}
            - name: {{ $envVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" $ }}-secrets
                  key: {{ $envVar }}
            {{- end }}
            {{- end }}
            # Extra plain env vars
            {{- range $key, $value := .Values.openclaw.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
          livenessProbe:
            httpGet:
              path: {{ .Values.openclaw.probes.liveness.path }}
              port: {{ .Values.openclaw.port }}
            initialDelaySeconds: {{ .Values.openclaw.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.openclaw.probes.readiness.path }}
              port: {{ .Values.openclaw.port }}
            initialDelaySeconds: {{ .Values.openclaw.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.openclaw.probes.readiness.periodSeconds }}
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "openclaw.fullname" . }}-config
        - name: openclaw-data
          {{- if .Values.openclaw.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
