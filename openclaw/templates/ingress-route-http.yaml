{{- if .Values.openclaw.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "openclaw.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`{{ .Values.openclaw.hostname }}`)
      priority: 10
      services:
        - kind: Service
          name: {{ include "openclaw.fullname" . }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.openclaw.port }}
      middlewares:
        - name: {{ include "openclaw.fullname" . }}-redirect-https
          namespace: {{ .Release.Namespace }}
{{- end }}
