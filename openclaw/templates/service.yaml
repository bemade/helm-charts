apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.openclaw.port }}
      targetPort: {{ .Values.openclaw.port }}
      name: http
