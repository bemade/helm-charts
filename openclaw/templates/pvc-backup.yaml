{{- if .Values.openclaw.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openclaw.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.openclaw.backup.storageClass }}
  storageClassName: {{ .Values.openclaw.backup.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.openclaw.backup.size }}
{{- end }}
