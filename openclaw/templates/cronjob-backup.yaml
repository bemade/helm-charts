{{- if .Values.openclaw.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "openclaw.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.openclaw.backup.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.openclaw.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.openclaw.backup.failedJobsHistoryLimit }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "openclaw.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          {{- if .Values.openclaw.serviceAccount.create }}
          serviceAccountName: {{ include "openclaw.fullname" . }}
          {{- end }}
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: "{{ .Values.openclaw.backup.image.repository }}:{{ .Values.openclaw.backup.image.tag }}"
              imagePullPolicy: {{ .Values.openclaw.backup.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache sqlite > /dev/null 2>&1
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backups/${TIMESTAMP}"
                  mkdir -p "${BACKUP_DIR}"
                  # SQLite online backup (safe even if gateway is running)
                  if [ -f /data/memory/main.sqlite ]; then
                    sqlite3 /data/memory/main.sqlite ".backup '${BACKUP_DIR}/memory.sqlite'"
                    echo "Memory DB backed up"
                  fi
                  # Copy config and session data
                  cp -a /data/openclaw.json "${BACKUP_DIR}/" 2>/dev/null || true
                  cp -ra /data/agents "${BACKUP_DIR}/" 2>/dev/null || true
                  cp -ra /data/cron "${BACKUP_DIR}/" 2>/dev/null || true
                  # Prune old backups (keep last N)
                  cd /backups
                  ls -dt */ | tail -n +{{ add .Values.openclaw.backup.retainCount 1 }} | xargs rm -rf 2>/dev/null || true
                  echo "Backup completed: ${BACKUP_DIR}"
              volumeMounts:
                - name: openclaw-data
                  mountPath: /data
                  readOnly: true
                - name: backup-storage
                  mountPath: /backups
              {{- with .Values.openclaw.backup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          volumes:
            - name: openclaw-data
              persistentVolumeClaim:
                claimName: {{ include "openclaw.fullname" . }}-data
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ include "openclaw.fullname" . }}-backup
{{- end }}
