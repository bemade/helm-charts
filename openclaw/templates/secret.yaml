{{/* Collect all non-empty secrets into a single Secret resource */}}
{{- $secrets := dict }}
{{- if .Values.openclaw.secrets.anthropicApiKey }}
{{-   $_ := set $secrets "ANTHROPIC_API_KEY" .Values.openclaw.secrets.anthropicApiKey }}
{{- end }}
{{- if .Values.openclaw.secrets.openaiApiKey }}
{{-   $_ := set $secrets "OPENAI_API_KEY" .Values.openclaw.secrets.openaiApiKey }}
{{- end }}
{{- if .Values.openclaw.secrets.gatewayToken }}
{{-   $_ := set $secrets "OPENCLAW_GATEWAY_TOKEN" .Values.openclaw.secrets.gatewayToken }}
{{- end }}
{{- range $envVar, $value := .Values.openclaw.secrets.extra }}
{{-   if $value }}
{{-     $_ := set $secrets $envVar $value }}
{{-   end }}
{{- end }}
{{- if $secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := $secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
