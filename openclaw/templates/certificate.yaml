{{- if .Values.openclaw.ingress.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "openclaw.fullname" . }}-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  secretName: {{ include "openclaw.fullname" . }}-cert
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: {{ .Values.openclaw.ingress.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.openclaw.hostname }}
{{- end }}
