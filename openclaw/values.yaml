# OpenClaw Helm Chart values
# https://github.com/openclaw/openclaw

# Override chart name
nameOverride: ""
fullnameOverride: ""

openclaw:
  # Docker image configuration
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: latest
    pullPolicy: IfNotPresent

  # Gateway port (default: 18789)
  port: 18789

  # Hostname for ingress
  hostname: "openclaw.example.com"

  # Command and args (override Docker entrypoint)
  # Note: port in args is overridden by the deployment template
  command:
    - "node"
    - "/app/openclaw.mjs"
  args: []

  # Ingress configuration
  ingress:
    enabled: true
    clusterIssuer: "letsencrypt-dns"
    hsts:
      enabled: true
      maxAge: 15552000
      includeSubdomains: true
      preload: true

  # Resource requests and limits
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

  # Persistence for OpenClaw data (~/.openclaw)
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi

  # OpenClaw configuration (openclaw.json)
  # Reference: https://docs.openclaw.ai/gateway/configuration
  config:
    gateway:
      mode: local
    agents:
      defaults:
        model:
          primary: "anthropic/claude-sonnet-4-20250514"

  # Health check probes
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

  # Pod annotations
  podAnnotations: {}

  # Node scheduling
  nodeSelector: {}
  tolerations: []

  # API keys and secrets (stored in Kubernetes Secret)
  # Set these via --set or external secret management
  secrets:
    # Anthropic API key
    anthropicApiKey: ""
    # OpenAI API key (optional)
    openaiApiKey: ""
    # Gateway token for Control UI authentication
    gatewayToken: ""
