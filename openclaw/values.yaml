# OpenClaw Helm Chart values
# https://github.com/openclaw/openclaw

# Override chart name
nameOverride: ""
fullnameOverride: ""

openclaw:
  # Docker image configuration
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: latest
    pullPolicy: IfNotPresent

  # Gateway port (default: 18789)
  port: 18789

  # Hostname for ingress
  hostname: "openclaw.example.com"

  # Command and args (override Docker entrypoint)
  # Leave empty to use the official entrypoint: node /app/dist/index.js gateway run
  command: []
  args: []

  # Ingress configuration
  ingress:
    enabled: true
    clusterIssuer: "letsencrypt-dns"
    hsts:
      enabled: true
      maxAge: 15552000
      includeSubdomains: true
      preload: true
    # ForwardAuth middleware for SSO (Keycloak, Authelia, oauth2-proxy, etc.)
    # Delegates authentication to an external identity provider via Traefik ForwardAuth.
    # Use with gateway.auth.mode: "trusted-proxy" in openclaw.config.
    forwardAuth:
      enabled: false
      # URL of the auth endpoint (e.g. oauth2-proxy, Keycloak gatekeeper)
      address: ""
      trustForwardHeader: true
      # Headers forwarded from the auth response to the upstream
      authResponseHeaders:
        - X-Forwarded-User
        - X-Auth-Request-User
        - X-Auth-Request-Email

  # Resource requests and limits
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

  # Persistence for OpenClaw data (~/.openclaw)
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi

  # OpenClaw configuration (openclaw.json)
  # Reference: https://docs.openclaw.ai/gateway/configuration
  config:
    gateway:
      mode: local
    agents:
      defaults:
        model:
          primary: "anthropic/claude-sonnet-4-20250514"

  # Health check probes (httpGet)
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 60
      periodSeconds: 30
    readiness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

  # Extra pod-level security context (merged with hardcoded fsGroup/seccomp)
  podSecurityContext: {}

  # Container-level security context (configurable)
  # For :slim images, you can enable readOnlyRootFilesystem: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Service account
  serviceAccount:
    create: false
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Node scheduling
  nodeSelector: {}
  tolerations: []

  # API keys and secrets (stored in Kubernetes Secret)
  # Set these via --set or external secret management
  secrets:
    # Anthropic API key → ANTHROPIC_API_KEY
    anthropicApiKey: ""
    # OpenAI API key → OPENAI_API_KEY
    openaiApiKey: ""
    # Gateway token → OPENCLAW_GATEWAY_TOKEN
    gatewayToken: ""
    # Extra secrets (generic key/value → env vars via K8s Secret)
    # Any env var OpenClaw supports can be added here.
    # Common examples:
    #   TELEGRAM_BOT_TOKEN: "your-telegram-bot-token"
    #   OPENROUTER_API_KEY: "sk-or-..."
    #   GROQ_API_KEY: "gsk_..."
    #   GOOGLE_API_KEY: "AIza..."
    #   OPENCLAW_GATEWAY_PASSWORD: "your-password"
    extra: {}

  # Extra plain (non-secret) environment variables
  extraEnv: {}

  # Backup CronJob - SQLite online backup + config/session snapshot
  backup:
    enabled: false
    schedule: "0 3 * * *"
    retainCount: 7
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    storageClass: ""
    size: 2Gi
    image:
      repository: alpine
      tag: "3.20"
      pullPolicy: IfNotPresent
    resources: {}
