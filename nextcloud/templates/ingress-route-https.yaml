{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "nextcloud.fullname" . }}-https
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" (dict "component" "ingress" "rootContext" $) | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingressRoute.clusterIssuer | quote }}
    {{- with .Values.ingressRoute.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.nextcloud.host }}`)
      kind: Rule
      {{- if .Values.ingressRoute.hsts.enabled }}
      middlewares:
        - name: {{ include "nextcloud.fullname" . }}-hsts
      {{- end }}
      services:
        - name: {{ include "nextcloud.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    secretName: {{ include "nextcloud.fullname" . }}-tls
{{- end }}
