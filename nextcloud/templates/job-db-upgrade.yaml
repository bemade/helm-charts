{{- if .Values.nextcloud.config.dbAddMissingIndices }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nextcloud.fullname" . }}-db-upgrade
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "nextcloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-upgrade
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-upgrade
          image: "{{ .Values.nextcloud.image.repository }}:{{ .Values.nextcloud.image.tag }}"
          imagePullPolicy: {{ .Values.nextcloud.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              php occ db:add-missing-indices --no-interaction
              php occ db:add-missing-columns --no-interaction
              php occ db:add-missing-primary-keys --no-interaction
          securityContext:
            runAsUser: 33
            runAsGroup: 33
          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: nextcloud-data
          {{- if .Values.nextcloud.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "nextcloud.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
