{{- if .Values.cnpg.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cnpg.name | default (printf "%s-db" (include "nextcloud.fullname" .)) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" (dict "component" "database" "rootContext" $) | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}
  storage:
    size: {{ .Values.cnpg.storage.size }}
    {{- if .Values.cnpg.storage.storageClass }}
    storageClassName: {{ .Values.cnpg.storage.storageClass }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.cnpg.database.name }}
      owner: {{ .Values.cnpg.database.owner }}
  {{- if .Values.cnpg.resources }}
  resources:
    {{- toYaml .Values.cnpg.resources | nindent 4 }}
  {{- end }}
{{- end }}
