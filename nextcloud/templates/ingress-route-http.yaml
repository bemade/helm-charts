{{- if .Values.nextcloud.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "nextcloud.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.nextcloud.hostname }}`)
      kind: Rule
      middlewares:
        - name: {{ include "nextcloud.fullname" . }}-redirect-https
          namespace: {{ .Release.Namespace }}
      services:
        - name: {{ include "nextcloud.fullname" . }}
          port: 80
{{- end }}
