apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud.fullname" . }}-php
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
data:
  # PHP configuration - uploaded to /usr/local/etc/php/conf.d/
  nextcloud-php.ini: |
    memory_limit={{ .Values.nextcloud.phpConfig.memoryLimit }}
    upload_max_filesize={{ .Values.nextcloud.phpConfig.uploadMaxFilesize }}
    post_max_size={{ .Values.nextcloud.phpConfig.postMaxSize }}
    max_execution_time={{ .Values.nextcloud.phpConfig.maxExecutionTime }}
    max_input_time={{ .Values.nextcloud.phpConfig.maxInputTime }}
  # PHP-FPM pool configuration
  www.conf: |
    [www]
    user = www-data
    group = www-data
    listen = 127.0.0.1:9000
    pm = dynamic
    pm.max_children = 20
    pm.start_servers = 5
    pm.min_spare_servers = 2
    pm.max_spare_servers = 10
    pm.max_requests = 500
    request_terminate_timeout = {{ .Values.nextcloud.phpConfig.maxExecutionTime }}
---
{{- if or .Values.nextcloud.config.trustedProxies .Values.nextcloud.config.dbAddMissingIndices }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud.fullname" . }}-hooks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
data:
  # Script to run maintenance tasks via occ command
  # Mounted to /docker-entrypoint-hooks.d/before-starting/
  nextcloud-maintenance.sh: |
    #!/bin/sh
    {{- if .Values.nextcloud.config.trustedProxies }}
    echo "Configuring trusted_proxies..."
    {{- range $i, $proxy := .Values.nextcloud.config.trustedProxies }}
    php occ config:system:set trusted_proxies {{ $i }} --value="{{ $proxy }}"
    {{- end }}
    echo "Trusted proxies configured."
    {{- end }}
    {{- if .Values.nextcloud.config.dbAddMissingIndices }}
    echo "Adding missing database indices..."
    php occ db:add-missing-indices
    echo "Database indices updated."
    {{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
data:
  # Nginx configuration for Nextcloud with PHP-FPM
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        types {
            text/javascript  mjs;
        }
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Max upload size
        client_max_body_size {{ .Values.nextcloud.phpConfig.uploadMaxFilesize }};
        client_body_timeout {{ .Values.nextcloud.phpConfig.maxExecutionTime }}s;
        client_body_buffer_size 512k;
        fastcgi_buffers 64 4K;

        upstream php-handler {
            server 127.0.0.1:9000;
        }

        server {
            listen 80;
            server_name _;

            root /var/www/html;
            index index.php index.html /index.php$request_uri;

            # Security headers
            add_header Referrer-Policy "no-referrer" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header X-Robots-Tag "noindex, nofollow" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # Remove X-Powered-By header
            fastcgi_hide_header X-Powered-By;

            # Path to the root of your installation
            location = /robots.txt {
                allow all;
                log_not_found off;
                access_log off;
            }

            # .well-known redirects for CalDAV/CardDAV
            location ^~ /.well-known {
                location = /.well-known/carddav { return 301 /remote.php/dav/; }
                location = /.well-known/caldav  { return 301 /remote.php/dav/; }
                location /.well-known/acme-challenge { try_files $uri $uri/ =404; }
                location /.well-known/pki-validation { try_files $uri $uri/ =404; }
                return 301 /index.php$request_uri;
            }

            # Deny access to internal paths
            location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
            location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) { return 404; }

            # Handle PHP files
            location ~ \.php(?:$|/) {
                rewrite ^/(?!index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|ocs-provider\/.+|.+\/richdocumentscode(_arm64)?\/proxy) /index.php$request_uri;

                fastcgi_split_path_info ^(.+?\.php)(/.*)$;
                set $path_info $fastcgi_path_info;

                try_files $fastcgi_script_name =404;

                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_param PATH_INFO $path_info;
                fastcgi_param HTTPS on;
                fastcgi_param modHeadersAvailable true;
                fastcgi_param front_controller_active true;

                fastcgi_pass php-handler;
                fastcgi_intercept_errors on;
                fastcgi_request_buffering off;
                fastcgi_read_timeout {{ .Values.nextcloud.phpConfig.maxExecutionTime }}s;
                fastcgi_send_timeout {{ .Values.nextcloud.phpConfig.maxExecutionTime }}s;
            }

            # Serve static files
            location ~ \.(?:css|js|mjs|svg|gif|png|jpg|ico|wasm|tflite|map|ogg|flac)$ {
                try_files $uri /index.php$request_uri;
                add_header Cache-Control "public, max-age=15778463, immutable";
                access_log off;
            }

            location ~ \.woff2?$ {
                try_files $uri /index.php$request_uri;
                expires 7d;
                access_log off;
            }

            # Rule borrowed from `.htaccess`
            location /remote {
                return 301 /remote.php$request_uri;
            }

            location / {
                try_files $uri $uri/ /index.php$request_uri;
            }
        }
    }
