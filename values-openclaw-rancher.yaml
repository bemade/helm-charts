# OpenClaw v0.4.0 - Values for bemade/openclaw chart
# Hostname: claw.3387.vezina.biz

# Override chart name
nameOverride: ""
fullnameOverride: ""

openclaw:
  # Docker image configuration
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: latest
    pullPolicy: IfNotPresent

  # Gateway port (default: 18789)
  port: 18789

  # Hostname for ingress
  hostname: "claw.3387.vezina.biz"

  # Command and args (override Docker entrypoint)
  command:
    - "node"
    - "/app/openclaw.mjs"
  args: []

  # Traefik IngressRoute + cert-manager
  ingress:
    enabled: true
    clusterIssuer: "letsencrypt-cloudflare-vezina"
    hsts:
      enabled: true
      maxAge: 15552000
      includeSubdomains: true
      preload: true
    # Keycloak SSO via oauth2-proxy ForwardAuth
    forwardAuth:
      enabled: false
      address: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
      trustForwardHeader: true
      authResponseHeaders:
        - X-Forwarded-User
        - X-Auth-Request-User
        - X-Auth-Request-Email

  # Resource requests and limits
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

  # Persistence for OpenClaw data (~/.openclaw)
  persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi

  # OpenClaw configuration (openclaw.json)
  # Reference: https://docs.openclaw.ai/gateway/configuration
  config:
    env:
      shellEnv:
        enabled: false
    auth:
      profiles:
        "anthropic:default":
          provider: anthropic
          mode: api_key
        "ollama:default":
          provider: ollama
          mode: api_key
    agents:
      defaults:
        model:
          primary: "ollama/glm-5:cloud"
        models:
          "ollama/glm-5:cloud": {}
          "ollama/glm-4.7-flash:latest": {}
          "ollama/qwen3.5:397b-cloud": {}
          "ollama/qwen3-coder-next:cloud": {}
          "ollama/qwen3-coder:480b-cloud": {}
          "ollama/deepseek-v3.1:671b-cloud": {}
          "anthropic/claude-haiku-4-5": {}
          "anthropic/claude-sonnet-4-6": {}
          "anthropic/claude-opus-4-6": {}
        workspace: "/home/openclaw/.openclaw/workspace"
        compaction:
          mode: safeguard
          reserveTokensFloor: 20000
          memoryFlush:
            enabled: true
            softThresholdTokens: 4000
            systemPrompt: "Session nearing compaction. Store durable memories now."
            prompt: "Pre-compaction memory flush. Store durable memories now (use memory/YYYY-MM-DD.md; create memory/ if needed). IMPORTANT: If the file already exists, APPEND new content only — do not overwrite existing entries. Do NOT create timestamped variant files (e.g., YYYY-MM-DD-HHMM.md); always use the canonical YYYY-MM-DD.md filename. If nothing to store, reply with NO_REPLY."
        heartbeat:
          every: "30m"
          target: telegram
          to: "8721734337"
          directPolicy: allow
          prompt: "Read HEARTBEAT.md if it exists (workspace context). Follow it strictly. Do not infer or repeat old tasks from prior chats. If nothing needs attention, reply HEARTBEAT_OK."
        maxConcurrent: 4
        subagents:
          maxConcurrent: 8
      list:
        - id: main
          model: "ollama/glm-5:cloud"
    tools:
      profile: coding
      web:
        search:
          provider: gemini
      exec:
        applyPatch:
          enabled: true
          allowModels: []
    messages:
      ackReactionScope: group-mentions
    commands:
      native: auto
      nativeSkills: auto
      restart: true
      ownerDisplay: raw
    session:
      dmScope: per-channel-peer
    cron:
      enabled: true
    hooks:
      internal:
        enabled: true
        entries:
          boot-md:
            enabled: true
          bootstrap-extra-files:
            enabled: true
          command-logger:
            enabled: true
          session-memory:
            enabled: true
    channels:
      telegram:
        enabled: true
        dmPolicy: pairing
        groupPolicy: allowlist
        streaming: partial
        # botToken injected via OPENCLAW_TELEGRAM_BOT_TOKEN env var or secret
    gateway:
      port: 18789
      mode: local
      # Bind to all interfaces for Kubernetes (lan = 0.0.0.0)
      bind: lan
      auth:
        mode: token
        # token injected via gatewayToken secret
      # Required for non-loopback Control UI access
      controlUi:
        enabled: true
        allowedOrigins:
          - "https://claw.3387.vezina.biz"
      tailscale:
        mode: "off"
        resetOnExit: false
      nodes:
        denyCommands:
          - camera.snap
          - camera.clip
          - screen.record
          - contacts.add
          - calendar.add
          - reminders.add
          - sms.send
    plugins:
      entries:
        telegram:
          enabled: true

  # Health check probes
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Container-level security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # Service account
  serviceAccount:
    create: false
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Node scheduling
  nodeSelector: {}
  tolerations: []

  # API keys and secrets (stored in Kubernetes Secret)
  # Set these via --set or external secret management
  secrets:
    anthropicApiKey: ""
    openaiApiKey: ""
    gatewayToken: "8d08186946d57ea73b84753af51462d2cd7fb51fa9a19860"
    extra:
      TELEGRAM_BOT_TOKEN: "8705187418:AAHkHvfdzVZDZ1btmTHEiWjP6SpmeTjs8YM"

  # Extra plain (non-secret) environment variables
  extraEnv: {}

  # Backup CronJob - SQLite online backup at 3 AM daily
  backup:
    enabled: true
    schedule: "0 3 * * *"
    retainCount: 7
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    storageClass: longhorn
    size: 2Gi
    image:
      repository: alpine
      tag: "3.20"
      pullPolicy: IfNotPresent
    resources: {}
